name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci && npm run build
        working-directory: ./frontend
        env:
          VITE_CLUTCH_API_BASE: https://clutch-api-695440268969.asia-south1.run.app
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          firebaseToolsVersion: "15.22.1"
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CLUTCH_APP_HK2706 }}
          channelId: live
          projectId: clutch-app-hk2706
          entryPoint: ./frontend
